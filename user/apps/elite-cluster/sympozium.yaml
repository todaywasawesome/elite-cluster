# app-1password-connect.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sympozium
  namespace: argocd 
spec:
  project: default
  destination:
    namespace: sympozium-system
    server: https://kubernetes.default.svc
  source:
    path: charts/sympozium
    repoURL: https://github.com/AlexsJones/sympozium/
    targetRevision: HEAD
  syncPolicy:
    syncOptions:
    - CreateNamespace=true
    - ServerSideApply=true